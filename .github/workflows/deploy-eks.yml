name: CI/CD Tienda Perritos EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  # Repos de ECR (no son secretos, solo nombres)
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_DB: tienda-db

jobs:
  build-and-push:
    name: Compilar y Publicar en Amazon ECR (Paralelo)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend, db]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then ECR_REPO=$ECR_REPO_FRONTEND; fi
          if [ "${{ matrix.service }}" = "backend" ]; then ECR_REPO=$ECR_REPO_BACKEND; fi
          if [ "${{ matrix.service }}" = "db" ]; then ECR_REPO=$ECR_REPO_DB; fi
          
          cd ${{ matrix.service }}
          docker build -t $ECR_REGISTRY/$ECR_REPO:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/$ECR_REPO:${IMAGE_TAG}

  deploy-to-eks:
    name: Desplegar en Amazon EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          CLUSTER_NAME="${EKS_CLUSTER_NAME:-tienda-eks}"
          REGION="${AWS_REGION:-us-east-1}"
          aws eks update-kubeconfig \
            --region "$REGION" \
            --name "$CLUSTER_NAME"
          kubectl config current-context

      - name: Aplicar manifests base (namespace, DB, servicios)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          NS="${EKS_NAMESPACE:-tienda}"
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mysql-secret.yaml -n "$NS"
          kubectl apply -f k8s/mysql-deployment.yaml -n "$NS"
          kubectl apply -f k8s/mysql-service.yaml -n "$NS"

      - name: Actualizar BACKEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          NS="${EKS_NAMESPACE:-tienda}"
          kubectl apply -f k8s/backend-deployment.yaml -n "$NS"
          kubectl apply -f k8s/backend-service.yaml -n "$NS"
          kubectl set image deployment/tienda-backend \
            backend=$ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} \
            -n "$NS"
          kubectl rollout status deployment/tienda-backend -n "$NS"

      - name: Actualizar FRONTEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          NS="${EKS_NAMESPACE:-tienda}"
          kubectl apply -f k8s/frontend-deployment.yaml -n "$NS"
          kubectl apply -f k8s/frontend-service.yaml -n "$NS"
          kubectl set image deployment/tienda-frontend \
            frontend=$ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -n "$NS"
          kubectl rollout status deployment/tienda-frontend -n "$NS"

      - name: Aplicar HPA (opcional)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          NS="${EKS_NAMESPACE:-tienda}"
          if [ -f k8s/backend-hpa.yaml ]; then kubectl apply -f k8s/backend-hpa.yaml -n "$NS"; fi
          if [ -f k8s/frontend-hpa.yaml ]; then kubectl apply -f k8s/frontend-hpa.yaml -n "$NS"; fi

      - name: Ver pods y servicios
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          NS="${EKS_NAMESPACE:-tienda}"
          kubectl get pods -n "$NS"
          kubectl get svc -n "$NS"
          kubectl get hpa -n "$NS" || true
