name: CI/CD Tienda Perritos EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  # Repos de ECR (no son secretos, solo nombres)
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_DB: tienda-db

jobs:
  build-and-push:
    name: Compilar y Publicar en Amazon ECR (Paralelo)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend, db]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then ECR_REPO=$ECR_REPO_FRONTEND; fi
          if [ "${{ matrix.service }}" = "backend" ]; then ECR_REPO=$ECR_REPO_BACKEND; fi
          if [ "${{ matrix.service }}" = "db" ]; then ECR_REPO=$ECR_REPO_DB; fi
          
          cd ${{ matrix.service }}
          docker build -t $ECR_REGISTRY/$ECR_REPO:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/$ECR_REPO:${IMAGE_TAG}

  deploy-to-eks:
    name: Desplegar en Amazon EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          kubectl config current-context

      - name: Aplicar manifests base (namespace, DB, servicios)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mysql-secret.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/mysql-deployment.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/mysql-service.yaml -n $EKS_NAMESPACE

      - name: Actualizar BACKEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/backend-deployment.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/backend-service.yaml -n $EKS_NAMESPACE
          kubectl set image deployment/tienda-backend \
            backend=$ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/tienda-backend -n $EKS_NAMESPACE

      - name: Actualizar FRONTEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/frontend-deployment.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/frontend-service.yaml -n $EKS_NAMESPACE
          kubectl set image deployment/tienda-frontend \
            frontend=$ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/tienda-frontend -n $EKS_NAMESPACE

      - name: Aplicar HPA (opcional)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          if [ -f k8s/backend-hpa.yaml ]; then kubectl apply -f k8s/backend-hpa.yaml -n $EKS_NAMESPACE; fi
          if [ -f k8s/frontend-hpa.yaml ]; then kubectl apply -f k8s/frontend-hpa.yaml -n $EKS_NAMESPACE; fi

      - name: Ver pods y servicios
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl get pods -n $EKS_NAMESPACE
          kubectl get svc -n $EKS_NAMESPACE
          kubectl get hpa -n $EKS_NAMESPACE || true
